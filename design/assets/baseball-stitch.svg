<svg xmlns="http://www.w3.org/2000/svg" width="60" height="500" viewBox="0 0 60 500">
  <!--
    Baseball stitching — realistic leaf/teardrop arcs
    Thin dark seam line with curved red stitches arcing outward
  -->

  <!-- Center seam thread (dark) -->
  <line x1="30" y1="0" x2="30" y2="500" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Red stitches — curved arcs alternating left and right -->
  <g fill="none" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round">
    <!-- Each stitch is a quadratic bezier arc from near the seam outward -->
    <!-- Left stitches curve left, right stitches curve right -->

